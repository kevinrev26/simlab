services:
  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    env_file: .env
    depends_on:
      - db
    ports:
      - 8000:8000
  db:
    image: postgres:16
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: